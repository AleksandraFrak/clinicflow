{% extends "base.html" %}

{% block title %}Delete Doctor | ClinicFlow{% endblock %}

{% block content %}
    <h2>Delete Doctor</h2>

    <p>
        Are you sure you want to delete
        <strong>Dr {{ doctor.first_name }} {{ doctor.last_name }}</strong>?
    </p>

    <form method="post">
        {% csrf_token %}
        <button type="submit">Yes, delete</button>
    </form>

    <br>

    <a href="{% url 'doctor_list' %}">Cancel</a>
{% endblock %}

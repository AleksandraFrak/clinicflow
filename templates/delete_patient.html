{% extends "base.html" %}

{% block title %}Delete Patient | ClinicFlow{% endblock %}

{% block content %}
    <h2>Delete Patient</h2>

    <p>Are you sure you want to delete <strong>{{ patient.first_name }} {{ patient.last_name }}</strong>?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit">Yes, delete</button>
    </form>

    <a href="{% url 'patient_list' %}">Cancel</a>
{% endblock %}
